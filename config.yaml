history_start: "2021-01-01"
force_download: false
reference_date: null  # overridden by --reference-date CLI flag or DAG param

universe:
  min_span_days:            365
  aum_lookback_days:        30
  min_aum:                  15_000_000
  min_cotistas:             300
  max_quote_staleness_days: 30
  min_obs_ratio:            0.5

windows:
  "1m":  1
  "3m":  3
  "6m":  6
  "12m": 12
  "24m": 24
  "36m": 36

# rates_by_taxation keys are raw CVM target_taxation field values
tax:
  cdi_ir_rate: 0.15
  rates_by_taxation:
    "Longo Prazo":     0.15
    "Isento":          0.00
    "Curto Prazo":     0.20
    "Alíquota de 15%": 0.15
  default_rate: 0.15
  exempt_keywords:  # matched against fund_name.upper()
    - "INCENTIV"
    - "INFRA"

bcb:
  serie_cdi: 12
  url: "https://api.bcb.gov.br/dados/serie/bcdata.sgs.12/dados"
  timeout_seconds: 30

scoring:
  # ascending=true → higher is better; false → lower is better (1 − percentile rank)
  # order must align with weight vectors below
  cont_features:
    - {col: alpha_12m_net,         ascending: true}
    - {col: alpha_3m_net,          ascending: true}
    - {col: alpha_6m_net,          ascending: true}
    - {col: alpha_24m_net,         ascending: true}
    - {col: alpha_36m_net,         ascending: true}
    - {col: return_annualized_net, ascending: true}
    - {col: sharpe_excess,         ascending: true}
    - {col: pct_months_above_cdi,  ascending: true}
    - {col: max_drawdown,          ascending: true}
    - {col: volatility,            ascending: false}

  # s_span = 1 − exp(−λ × span_years): 1y≈0.39, 3y≈0.78, 10y≈0.99
  span_lambda: 0.5

  # s_liquidity = exp(−λ × redemption_days)
  liquidity_lambda:
    cash:   0.2   # D+5 → 0.37
    income: 0.03  # D+30 → 0.41

  # s_accessibility = exp(−min_investment / scale); applied only for investor_type=retail
  accessibility_scale:  100_000
  accessibility_weight: 0.05

  # [alpha_12m, alpha_3m, alpha_6m, alpha_24m, alpha_36m, ret_ann, sharpe, pct_months, mdd, vol, span, liquidity]
  # each vector must sum to 1.0
  weights:
    cash:
      conservative: [0.06, 0.06, 0.06, 0.04, 0.03, 0.05, 0.08, 0.26, 0.11, 0.13, 0.02, 0.10]
      balanced:     [0.06, 0.06, 0.06, 0.04, 0.03, 0.05, 0.08, 0.26, 0.11, 0.13, 0.02, 0.10]
      aggressive:   [0.06, 0.06, 0.06, 0.04, 0.03, 0.05, 0.08, 0.26, 0.11, 0.13, 0.02, 0.10]
    income:
      conservative: [0.14, 0.07, 0.12, 0.10, 0.04, 0.09, 0.06, 0.06, 0.09, 0.12, 0.04, 0.07]
      balanced:     [0.22, 0.08, 0.20, 0.12, 0.10, 0.12, 0.01, 0.05, 0.02, 0.02, 0.01, 0.05]
      aggressive:   [0.25, 0.08, 0.21, 0.12, 0.10, 0.13, 0.01, 0.05, 0.02, 0.02, 0.01, 0.00]

rankings:
  - {purpose: cash,   profile: conservative, investor_type: retail}
  - {purpose: cash,   profile: conservative, investor_type: qualified}
  - {purpose: cash,   profile: conservative, investor_type: professional}
  - {purpose: cash,   profile: balanced,     investor_type: retail}
  - {purpose: cash,   profile: balanced,     investor_type: qualified}
  - {purpose: cash,   profile: balanced,     investor_type: professional}
  - {purpose: cash,   profile: aggressive,   investor_type: retail}
  - {purpose: cash,   profile: aggressive,   investor_type: qualified}
  - {purpose: cash,   profile: aggressive,   investor_type: professional}
  - {purpose: income, profile: conservative, investor_type: retail}
  - {purpose: income, profile: conservative, investor_type: qualified}
  - {purpose: income, profile: conservative, investor_type: professional}
  - {purpose: income, profile: balanced,     investor_type: retail}
  - {purpose: income, profile: balanced,     investor_type: qualified}
  - {purpose: income, profile: balanced,     investor_type: professional}
  - {purpose: income, profile: aggressive,   investor_type: retail}
  - {purpose: income, profile: aggressive,   investor_type: qualified}
  - {purpose: income, profile: aggressive,   investor_type: professional}

top_n: 5

output:
  ranking_md:      "output/ranking.md"
  ranking_json:    "output/ranking.json"
  metrics_parquet: "output/metrics.parquet"
