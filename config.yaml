# =============================================================================
# Fixed Income Fund Ranking — pipeline configuration
# All tunable parameters live here. run.py loads via Settings.from_yaml().
# =============================================================================

# -----------------------------------------------------------------------------
# Run-time controls
# -----------------------------------------------------------------------------
# When force_download=true every loader bypasses local caches and re-downloads
# the source file from the network. Default is false: the pipeline reuses
# cached raw files and processed parquets whenever possible.
force_download: false

# -----------------------------------------------------------------------------
# Reference date — the only absolute time anchor
# -----------------------------------------------------------------------------
# Everything else is derived:
#   quotes_end          = reference_date
#   quotes_start        = reference_date - max(windows) months
#   aum_lookback_months = months between (reference_date - aum_lookback_days)
#                         and reference_date, inclusive
reference_date: null

# -----------------------------------------------------------------------------
# Universe (CVM registry + inf_diario for AuM/holders)
# -----------------------------------------------------------------------------
# AuM and holders are measured as the median over the last N days before
# reference_date. The window may cross a month boundary, so the pipeline
# loads every YYYYMM file covered by the window.
universe:
  min_span_days:     365         # fund needs ≥ N days of quote history to enter the ranking
  aum_lookback_days: 30          # window used to compute median AuM / holders
  min_aum:           15_000_000  # min median AuM over the window, BRL
  min_cotistas:      300         # min median holders over the window

# -----------------------------------------------------------------------------
# Trailing windows (in months)
# -----------------------------------------------------------------------------
windows:
  "1m":  1
  "3m":  3
  "6m":  6
  "12m": 12
  "24m": 24
  "36m": 36

# -----------------------------------------------------------------------------
# Taxation (IR on accumulated period returns — flat rate, PoC simplification)
# -----------------------------------------------------------------------------
# rates_by_taxation keys are the raw CVM target_taxation field values.
tax:
  cdi_ir_rate: 0.15
  rates_by_taxation:
    "Longo Prazo":     0.15
    "Isento":          0.00
    "Curto Prazo":     0.20
    "Alíquota de 15%": 0.15
  default_rate: 0.15
  exempt_keywords:    # matched against fund_name.upper()
    - "INCENTIV"
    - "INFRA"

# -----------------------------------------------------------------------------
# CDI (BCB SGS series 12 — daily rate)
# -----------------------------------------------------------------------------
bcb:
  serie_cdi: 12
  url:       "https://api.bcb.gov.br/dados/serie/bcdata.sgs.12/dados"
  timeout_seconds: 30

# -----------------------------------------------------------------------------
# Scoring
# -----------------------------------------------------------------------------
scoring:
  # Continuous features: order must align with the weight vectors below.
  # ascending=true  → higher is better (percentile rank used directly).
  # ascending=false → lower is better (1 - percentile rank).
  cont_features:
    - {col: alpha_12m_net,         ascending: true}
    - {col: alpha_3m_net,          ascending: true}
    - {col: alpha_6m_net,          ascending: true}
    - {col: alpha_24m_net,         ascending: true}
    - {col: alpha_36m_net,         ascending: true}
    - {col: return_annualized_net, ascending: true}
    - {col: sharpe_excess,         ascending: true}
    - {col: pct_months_above_cdi,  ascending: true}
    - {col: max_drawdown,          ascending: true}
    - {col: volatility,            ascending: false}

  # s_span = 1 - exp(-λ × span_years).  λ=0.5 → 1y≈0.39, 3y≈0.78, 10y≈0.99
  span_lambda: 0.5

  # s_liquidity = exp(-λ × redemption_days)
  # cash:   heavy penalty (D+5 → 0.37).  income: light penalty (D+30 → 0.41).
  liquidity_lambda:
    cash:   0.2
    income: 0.03
  
  accessibility_scale:  100_000 # s_accessibility = exp(-min_investment / scale). Applied only for investor_type=retail.
  accessibility_weight: 0.05    # rescales other weights by (1 - this value)

  # Weights per purpose × profile.
  # Order: [alpha_12m, alpha_3m, alpha_6m, alpha_24m, alpha_36m, ret_ann, sharpe, pct_months, mdd, vol, s_span, s_liquidity]
  # Each vector must sum to 1.0.
  weights:
    cash:
      conservative: [0.06, 0.06, 0.06, 0.04, 0.03, 0.05, 0.08, 0.26, 0.11, 0.13, 0.02, 0.10]
      balanced:     [0.06, 0.06, 0.06, 0.04, 0.03, 0.05, 0.08, 0.26, 0.11, 0.13, 0.02, 0.10]
      aggressive:   [0.06, 0.06, 0.06, 0.04, 0.03, 0.05, 0.08, 0.26, 0.11, 0.13, 0.02, 0.10]
    income:
      conservative: [0.14, 0.07, 0.12, 0.10, 0.04, 0.09, 0.06, 0.06, 0.09, 0.12, 0.04, 0.07]
      balanced:     [0.22, 0.08, 0.20, 0.12, 0.10, 0.12, 0.01, 0.05, 0.02, 0.02, 0.01, 0.05]
      aggressive:   [0.25, 0.08, 0.21, 0.12, 0.10, 0.13, 0.01, 0.05, 0.02, 0.02, 0.01, 0.00]

# -----------------------------------------------------------------------------
# Ranking combinations generated in ranking.md
# -----------------------------------------------------------------------------
rankings:
  - {purpose: cash,   profile: conservative,     investor_type: retail}
  - {purpose: income, profile: balanced, investor_type: retail}
  - {purpose: income, profile: aggressive,     investor_type: professional}

top_n: 5

# -----------------------------------------------------------------------------
# Output
# -----------------------------------------------------------------------------
output:
  ranking_md:      "output/ranking.md"
  ranking_json:    "output/ranking.json"
  metrics_parquet: "output/metrics.parquet"
